<svg width="400" height="320" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="320" fill="#f0fdf4"/>
  
  <!-- Computer/Dashboard illustration -->
  <rect x="80" y="60" width="240" height="160" rx="8" fill="#1a472a"/>
  <rect x="90" y="70" width="220" height="130" rx="4" fill="#166534"/>
  
  <!-- Screen content -->
  <rect x="100" y="80" width="80" height="40" rx="4" fill="#22c55e"/>
  <rect x="190" y="80" width="110" height="40" rx="4" fill="#f59e0b"/>
  <rect x="100" y="130" width="200" height="8" rx="2" fill="#dcfce7"/>
  <rect x="100" y="145" width="160" height="8" rx="2" fill="#dcfce7"/>
  <rect x="100" y="160" width="180" height="8" rx="2" fill="#dcfce7"/>
  <rect x="100" y="175" width="120" height="8" rx="2" fill="#dcfce7"/>
  
  <!-- Computer stand -->
  <rect x="170" y="220" width="60" height="20" fill="#1a472a"/>
  <rect x="140" y="235" width="120" height="10" rx="2" fill="#166534"/>
  
  <!-- Person on left -->
  <circle cx="50" cy="200" r="20" fill="#f59e0b"/>
  <path d="M30 240 Q50 260 70 240" fill="#1a472a"/>
  <rect x="35" y="260" width="30" height="40" rx="4" fill="#1a472a"/>
  
  <!-- Person on right -->
  <circle cx="350" cy="200" r="20" fill="#22c55e"/>
  <path d="M330 240 Q350 260 370 240" fill="#166534"/>
  <rect x="335" y="260" width="30" height="40" rx="4" fill="#166534"/>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="100" r="15" fill="#f59e0b" opacity="0.3"/>
  <circle cx="360" cy="80" r="10" fill="#22c55e" opacity="0.3"/>
  <circle cx="370" cy="140" r="8" fill="#1a472a" opacity="0.2"/>
</svg>
