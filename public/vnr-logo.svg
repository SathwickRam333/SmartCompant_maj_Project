<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- VNR VJIET Logo Placeholder -->
  <defs>
    <linearGradient id="vnrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="190" height="90" rx="10" fill="url(#vnrGrad)"/>
  
  <!-- VNR Text -->
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#f59e0b" text-anchor="middle">VNR VJIET</text>
  
  <!-- Subtitle -->
  <text x="100" y="65" font-family="Arial, sans-serif" font-size="10" 
        fill="white" text-anchor="middle">Vallurupalli Nageswara Rao Vignana Jyothi</text>
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="10" 
        fill="white" text-anchor="middle">Institute of Engineering & Technology</text>
  
  <!-- Decorative elements -->
  <circle cx="20" cy="50" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="180" cy="50" r="8" fill="#f59e0b" opacity="0.3"/>
</svg>
